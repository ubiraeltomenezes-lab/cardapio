<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzaria Express</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; padding: 15px; margin: 0; }
        .container { max-width: 500px; margin: auto; }
        .card { background: #2d2d2d; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 5px solid #e63946; }
        h2 { color: #e63946; font-size: 1.1em; margin-top: 0; border-bottom: 1px solid #444; padding-bottom: 5px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; background: #444; color: white; box-sizing: border-box; }
        .btn-categoria { width: 100%; background: #444; color: white; border: 2px solid #e63946; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 10px; text-align: left; position: relative; }
        .btn-categoria::after { content: '▼'; position: absolute; right: 15px; }
        .menu-grid { display: none; background: #333; border-radius: 8px; padding: 10px; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .item-grid { background: #444; padding: 12px; border-radius: 5px; text-align: center; cursor: pointer; font-size: 0.9em; border: 1px solid #555; }
        .item-selecionado { display: flex; align-items: center; justify-content: space-between; background: #3d3d3d; padding: 10px; border-radius: 8px; margin-top: 8px; border: 1px solid #444; }
        .controles { display: flex; align-items: center; gap: 15px; }
        .btn-qtd { background: #e63946; color: white; border: none; width: 28px; height: 28px; border-radius: 50%; font-weight: bold; cursor: pointer; }
        .btn-enviar { width: 100%; background: #28a745; color: white; border: none; padding: 18px; border-radius: 8px; font-weight: bold; font-size: 1.1em; cursor: pointer; margin-top: 10px; }
        .total-box { background: #e63946; padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 15px; }
        .pix-box { background: #1f1f1f; padding: 15px; border-radius: 8px; margin-top: 10px; border: 1px dashed #00ffd5; text-align: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h2>👤 Entrega</h2>
        <input type="text" id="nome" placeholder="Nome">
        <input type="text" id="rua" placeholder="Rua e Número">
        <select id="bairro" onchange="calc()"><option value="0">Bairro</option><option value="5">Centro (R$ 5)</option></select>
    </div>
    <div class="card">
        <h2>🍕 Pizza</h2>
        <button class="btn-categoria" onclick="toggleMenu('lista1')">Escolher Sabor</button>
        <div id="lista1" class="menu-grid">
            <div class="item-grid" onclick="escolherSabor('Mussarela')">Mussarela</div>
            <div class="item-grid" onclick="escolherSabor('Calabresa')">Calabresa</div>
        </div>
        <p id="saborEscolhido" style="text-align:center; color:#00ffd5"></p>
    </div>
    <div class="card">
        <h2>🥟 Esfihas, Porções e Bebidas</h2>
        <button class="btn-categoria" onclick="toggleMenu('extras')">Adicionar Itens</button>
        <div id="extras" class="menu-grid">
            <div class="item-grid" onclick="addItem('Carne', 5)">Esfiha Carne (R$5)</div>
            <div class="item-grid" onclick="addItem('Coca 2L', 12)">Coca 2L (R$12)</div>
        </div>
        <div id="carrinho"></div>
    </div>
    <div class="card">
        <h2>💳 Pagamento</h2>
        <select id="pagamento" onchange="verPix()">
            <option value="Cartão">Cartão</option>
            <option value="Dinheiro">Dinheiro</option>
            <option value="PIX">PIX</option>
        </select>
        <div id="painelPix" class="hidden pix-box">
            <p>Chave PIX: <b>13997446989</b></p>
            <small>Envie o comprovante após o pedido.</small>
        </div>
    </div>
    <div class="total-box">Total: <b id="resTotal">R$ 0,00</b></div>
    <button class="btn-enviar" onclick="enviar()">🚀 ENVIAR PEDIDO</button>
</div>
<script>
    let saborPizza = '', pedido = {};
    function toggleMenu(id) { let m = document.getElementById(id); m.style.display = m.style.display === 'grid' ? 'none' : 'grid'; }
    function escolherSabor(s) { saborPizza = s; document.getElementById('saborEscolhido').innerText = "Sabor: " + s; toggleMenu('lista1'); calc(); }
    function addItem(nome, preco) {
        pedido[nome] = pedido[nome] || { qtd: 0, preco: preco };
        pedido[nome].qtd++;
        render(); calc();
    }
    function mudar(nome, d) {
        pedido[nome].qtd += d;
        if (pedido[nome].qtd <= 0) delete pedido[nome];
        render(); calc();
    }
    function render() {
        let h = '';
        for (let n in pedido) {
            h += `<div class="item-selecionado"><span>${n}</span><div class="controles"><button class="btn-qtd" onclick="mudar('${n}',-1)">-</button><span>${pedido[n].qtd}</span><button class="btn-qtd" onclick="mudar('${n}',1)">+</button></div></div>`;
        }
        document.getElementById('carrinho').innerHTML = h;
    }
    function verPix() { document.getElementById('painelPix').className = document.getElementById('pagamento').value === 'PIX' ? 'pix-box' : 'hidden'; }
    function calc() {
        let t = parseFloat(document.getElementById('bairro').value) || 0;
        if(saborPizza) t += 40;
        for (let n in pedido) t += (pedido[n].qtd * pedido[n].preco);
        document.getElementById('resTotal').innerText = "R$ " + t.toFixed(2);
        return t;
    }
    function enviar() {
        let n = document.getElementById('nome').value;
        if(!n) return alert("Digite seu nome");
        let msg = `*PEDIDO*%0A*Nome:* ${n}%0A*Pizza:* ${saborPizza}%0A`;
        for (let it in pedido) msg += `*${it}:* ${pedido[it].qtd}x%0A`;
        msg += `%0A*Total: R$ ${calc().toFixed(2)}*%0A*Pgto:* ${document.getElementById('pagamento').value}`;
        window.open("https://wa.me/551396963108?text=" + msg);
    }
</script>
</body>
</html>
